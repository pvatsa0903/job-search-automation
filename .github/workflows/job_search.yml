name: Job Search Automation

on:
  schedule:
    # 3 pm PST = 23:00 UTC  (Mon–Thu)
    - cron: "0 23 * * 1-4"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write   # needed to commit results back to main

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        run: python job_search.py

      - name: Commit results + dashboard to main
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add results/ index.html
          git diff --staged --quiet \
            || git commit -m "Job search results $(date -u +%Y-%m-%d)"
          git push
